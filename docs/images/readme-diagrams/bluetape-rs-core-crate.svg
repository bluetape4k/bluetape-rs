<svg xmlns="http://www.w3.org/2000/svg" width="1184" height="997" viewBox="0 0 1184 997" role="img" aria-label="bluetape-rs-core">
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.10"/></filter>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 1 1 L 7 4 L 1 7 Z" fill="#758297"/></marker>
  <style>
    .canvas{fill:#f7f9fc}.frame{fill:#fff;stroke:#d8e0ea;stroke-width:1.5}
    .body{fill:#fbfcff;stroke:#e5eaf1;stroke-width:1.2}.footer{fill:#f8fafc;stroke:#d8e0ea;stroke-width:1.2}
    .title{font-family:"Architects Daughter","Comic Sans MS",cursive;font-size:40px;font-weight:400;fill:#102033}
    .subtitle,.footerText{font-family:"Comic Mono",monospace;font-size:15px;font-weight:400;fill:#536273}
    .label{font-family:"Architects Daughter","Comic Sans MS",cursive;font-size:23px;font-weight:400;fill:#102033}
    .small{font-family:"Comic Mono",monospace;font-size:13px;font-weight:400;fill:#536273}
    .card{stroke-width:2.0;filter:url(#shadow)}.line{stroke:#758297;stroke-width:2.1;fill:none;marker-end:url(#arrow)}
  </style>
</defs>
<rect class="canvas" width="1184" height="997"/>
<rect class="frame" x="28" y="24" width="1128" height="949" rx="28"/>
<text class="title" x="58" y="70">bluetape-rs-core</text>
<text class="subtitle" x="62" y="101">Graphviz-derived input, helper, and output contract</text>
<rect class="body" x="54" y="142" width="1075.9646" height="743.4292" rx="18"/>
<g>
<path class="line" d="M 304.7 447.2 L 304.7 447.2 L 353.9 447.2 L 353.9 447.2"/>
<path class="line" d="M 834.1 447.2 L 834.1 447.2 L 882.9 447.2 L 882.9 447.2"/>
<g transform="translate(72.0,302.3)">
  <rect class="card" x="0" y="0" width="233.0" height="289.3" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text class="label" x="116.5" y="42.0" text-anchor="middle">Inputs</text>
  <text class="small" x="116.5" y="72.0" text-anchor="middle">caller field names</text>
  <text class="small" x="116.5" y="97.0" text-anchor="middle">strings</text>
  <text class="small" x="116.5" y="122.0" text-anchor="middle">numbers</text>
  <text class="small" x="116.5" y="147.0" text-anchor="middle">hex text</text>
</g>
<g transform="translate(372.8,328.6)">
  <rect class="card" x="0" y="0" width="461.7" height="236.8" rx="14" fill="#DDEBFF" stroke="#5B8DEF"/>
  <text class="label" x="230.9" y="42.0" text-anchor="middle">bluetape-rs-core</text>
  <text class="small" x="230.9" y="72.0" text-anchor="middle">typed validation errors</text>
  <text class="small" x="230.9" y="97.0" text-anchor="middle">Result-first helper contracts</text>
  <text class="small" x="230.9" y="122.0" text-anchor="middle">modules: error | string | number | hex</text>
</g>
<g transform="translate(901.9,302.3)">
  <rect class="card" x="0" y="0" width="210.1" height="289.3" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text class="label" x="105.1" y="42.0" text-anchor="middle">Outputs</text>
  <text class="small" x="105.1" y="72.0" text-anchor="middle">validated values</text>
  <text class="small" x="105.1" y="97.0" text-anchor="middle">ValidationError</text>
  <text class="small" x="105.1" y="122.0" text-anchor="middle">safe fallbacks</text>
  <text class="small" x="105.1" y="147.0" text-anchor="middle">UTF-8 truncation</text>
</g>
<g transform="translate(435.7,683.2)">
  <rect class="card" x="0" y="0" width="335.9" height="184.3" rx="14" fill="#F2F4F7" stroke="#8CA0B8"/>
  <text class="label" x="168.0" y="42.0" text-anchor="middle">Route meaning</text>
  <text class="small" x="168.0" y="72.0" text-anchor="middle">left edge: caller input</text>
  <text class="small" x="168.0" y="97.0" text-anchor="middle">right edge: returned output</text>
</g>
</g>
<rect class="footer" x="54" y="903.4292" width="1075.9646" height="36" rx="12"/>
<text class="footerText" x="592" y="927.4292" text-anchor="middle">Use std, Option, and Result first; add helpers only for repeated backend patterns.</text>
</svg>