<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="490" viewBox="0 0 1100 490" role="img" aria-label="bluetape-rs-test">
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#1f2937" flood-opacity="0.10"/></filter>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M 1 1 L 7 4 L 1 7 Z" fill="#758297"/></marker>
  <style>
    .canvas{fill:#f7f9fc}.frame{fill:#fff;stroke:#d8e0ea;stroke-width:1.5}.body{fill:#fbfcff;stroke:#e5eaf1;stroke-width:1.2}.footer{fill:#f8fafc;stroke:#d8e0ea;stroke-width:1.2}
    .title{font-family:"Architects Daughter","Comic Sans MS",cursive;font-size:38px;font-weight:400;fill:#102033}
    .subtitle,.footerText{font-family:"Comic Mono",monospace;font-size:14px;font-weight:400;fill:#536273}
    .label{font-family:"Architects Daughter","Comic Sans MS",cursive;font-size:22px;font-weight:400;fill:#102033}
    .small{font-family:"Comic Mono",monospace;font-size:13px;font-weight:400;fill:#536273}
    .card{stroke-width:2;filter:url(#shadow)}.route{stroke:#758297;stroke-width:2.1;fill:none;marker-end:url(#arrow)}
  </style>
</defs>
<rect class="canvas" width="1100" height="490"/>
<rect class="frame" x="24" y="22" width="1052" height="446" rx="26"/>
<text class="title" x="54" y="66">bluetape-rs-test</text>
<text class="subtitle" x="58" y="94">Graphviz-derived deterministic test helper boundary</text>
<rect class="body" x="42" y="122" width="1016" height="300" rx="18"/><path class="route" d="M 280 277 L 370 277"/><path class="route" d="M 730 277 L 820 277"/><g><rect class="card" x="90" y="212" width="190" height="130" rx="13" fill="#FFFFFF" stroke="#CBD5E1"/><text class="label" x="185" y="233.0" text-anchor="middle">Inputs</text><text class="small" x="185" y="261.0" text-anchor="middle">futures</text><text class="small" x="185" y="284.0" text-anchor="middle">worker closures</text><text class="small" x="185" y="307.0" text-anchor="middle">temp prefixes</text><text class="small" x="185" y="330.0" text-anchor="middle">timing policy</text></g><g><rect class="card" x="370" y="212" width="360" height="130" rx="13" fill="#FFF0C9" stroke="#D6A441"/><text class="label" x="550" y="244.5" text-anchor="middle">bluetape-rs-test</text><text class="small" x="550" y="272.5" text-anchor="middle">async assertions</text><text class="small" x="550" y="295.5" text-anchor="middle">concurrency harnesses</text><text class="small" x="550" y="318.5" text-anchor="middle">modules: async_assert | concurrent | temp_dir</text></g><g><rect class="card" x="820" y="212" width="190" height="130" rx="13" fill="#FFFFFF" stroke="#CBD5E1"/><text class="label" x="915" y="233.0" text-anchor="middle">Outputs</text><text class="small" x="915" y="261.0" text-anchor="middle">eventual checks</text><text class="small" x="915" y="284.0" text-anchor="middle">multithread reports</text><text class="small" x="915" y="307.0" text-anchor="middle">suspended jobs</text><text class="small" x="915" y="330.0" text-anchor="middle">TempDir cleanup</text></g>
<rect class="footer" x="42" y="426" width="1016" height="34" rx="10"/>
<text class="footerText" x="550" y="448" text-anchor="middle">Testcontainers fixtures stay deferred to a dedicated crate and milestone.</text>
</svg>