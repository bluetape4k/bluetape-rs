dle">temp resources</text></g><g><rect class="card" x="742" y="332" width="170" height="105" rx="13" fill="#E8E0FF" stroke="#8A72D6"/><text class="label" x="827" y="352.0" text-anchor="middle">Collections</text><text class="small" x="827" y="380.0" text-anchor="middle">iterator helpers</text><text class="small" x="827" y="403.0" text-anchor="middle">map transforms</text><text class="small" x="827" y="426.0" text-anchor="middle">page values</text></g><g><rect class="card" x="970" y="332" width="160" height="105" rx="13" fill="#FFE1DF" stroke="#DC6B82"/><text class="label" x="1050" y="352.0" text-anchor="middle">Async</text><text class="small" x="1050" y="380.0" text-anchor="middle">bounded tasks</text><text class="small" x="1050" y="403.0" text-anchor="middle">timeouts</text><text class="small" x="1050" y="426.0" text-anchor="middle">shutdown</text></g><g><rect class="card" x="292" y="482" width="690" height="80" rx="13" fill="#F2F4F7" stroke="#8CA0B8"/><text class="label" x="637" y="501.0" text-anchor="middle">Deferred package families</text><text class="small" x="637" y="529.0" text-anchor="middle">codec, compression, serde, testcontainers</text><text class="small" x="637" y="552.0" text-anchor="middle">SQL, SQLx, resilience, leader, AWS, audit, graph, text, workshop</text></g>
